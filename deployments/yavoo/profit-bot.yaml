apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: profit-bot
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: profit-bot
  namespace: yavoo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: profit-bot
  template:
    metadata:
      labels:
        app: profit-bot
    spec:
      containers:
        - image: agonbar/profit_bot
          name: profit-bot
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: yavoo
                  key: botToken
          volumeMounts:
            - name: db
              mountPath: /app/bot.db
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
      volumes:
        - name: db
          hostPath:
              type: File
              path: /docker/profit_bot_yavoo/bot.db
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
