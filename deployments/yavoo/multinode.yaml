apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: multinodestorj
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: multinodestorj
  namespace: yavoo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: multinodestorj
  template:
    metadata:
      labels:
        app: multinodestorj
    spec:
      containers:
        - image: storjlabs/multinode:latest
          name: multinodestorj
          ports:
          - containerPort: 15002
            hostPort: 15002
          volumeMounts:
          - name: config-volume
            mountPath: /app/config
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
            limits:
              cpu: 1000m
              memory: 1000Mi
      volumes:
      - name: config-volume
        hostPath:
          path: /docker/multinodestorj/config
          type: Directory
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
---
kind: Service
apiVersion: v1
metadata:
  name: multinodestorj
  namespace: yavoo
spec:
  type: NodePort
  selector:
    app: multinodestorj
  ports:
    - protocol: TCP
      port: 15002
      targetPort: 15002
      name: multinodestorj


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multinodestorj-https
  namespace: yavoo
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: yavoo-yavoo-authsecret@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: multinode.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: multinodestorj
                port:
                  number: 15002
  tls:
    - secretName: multinode.${BASE_DOMAIN}
      hosts:
        - multinode.${BASE_DOMAIN}
---
# Declaring the user list
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: yavoo-authsecret
  namespace: yavoo
spec:
  basicAuth:
    secret: yavoo-authsecret
