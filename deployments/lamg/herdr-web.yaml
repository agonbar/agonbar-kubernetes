# herdr-web — TLS entry point via the lamg cluster's Traefik.
#
# herdr-web runs on the work-vm fleet (HTTP, tailnet only). This fronts the
# fleet's front-door / aggregator (work-vm-00) with a real Let's Encrypt cert so
# it's reachable at https://herdr.${BASE_DOMAIN} — which also makes the PWA
# installable on Android (a trusted cert is required for service workers).
#
# Exposure: PUBLIC, password-gated only (deliberate choice). The herdr-web HMAC
# password is the only gate, and the fleet spawns `claude --permission-mode
# bypassPermissions` — so treat this URL as sensitive. To lock it down later,
# add a Traefik ipAllowList middleware (tailnet 100.64.0.0/10) or basic-auth.
#
# Backend: a selector-less Service + a manually-managed Endpoints object pointing
# at the front-door's tailnet IP (cluster nodes route to 100.72.0.x via
# flannel-iface=tailscale0). Endpoints (not ExternalName) so Traefik keeps the
# real backend IP and ExternalName-via-Ingress restrictions don't apply.
#
# Backend target is currently work-vm-01 (100.72.0.46) because the vm-00
# front-door is DOWN; verified reachable from a cluster pod (HTTP 200). Repoint
# to 100.72.0.8 when vm-00 is back for fleet aggregation. DNS needs nothing — a
# wildcard *.${BASE_DOMAIN} already resolves herdr.* to the public ingress, so
# the HTTP-01 cert issued automatically. WebSocket (/ws) and SSE
# (/api/events) pass through k3s Traefik without extra config.
apiVersion: v1
kind: Service
metadata:
  name: herdr-web
  namespace: lamg
spec:
  ports:
    - name: http
      port: 8787
      targetPort: 8787
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: herdr-web
  namespace: lamg
subsets:
  - addresses:
      - ip: 100.72.0.46       # work-vm-01 — live peer w/ the real agents (vm-00 front-door is DOWN; repoint to 100.72.0.8 when back)
    ports:
      - name: http
        port: 8787
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: herdr-web
  namespace: lamg
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # basic-auth gate in front of herdr's own password (same pattern as yavoo).
    # Ref format: <namespace>-<middleware-name>@kubernetescrd.
    traefik.ingress.kubernetes.io/router.middlewares: lamg-herdr-authsecret@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: herdr.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: herdr-web
                port:
                  number: 8787
  tls:
    - secretName: herdr.${BASE_DOMAIN}
      hosts:
        - herdr.${BASE_DOMAIN}
---
# basic-auth (htpasswd in the SealedSecret herdr-authsecret). Works regardless
# of client source IP — unlike an ipAllowList, which is unreliable here because
# Traefik runs externalTrafficPolicy=Cluster (SNAT hides the real client IP).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: herdr-authsecret
  namespace: lamg
spec:
  basicAuth:
    secret: herdr-authsecret
