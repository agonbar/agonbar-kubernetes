# herdr-web — TLS entry via the lamg cluster's Traefik, gated by Authentik
# (sensei IdP) forward-auth for passkey/TOTP login.
#
# Auth happens at the proxy layer (a real trust boundary), NOT inside the app:
# the `herdr-authentik` forwardAuth middleware (see herdr-outpost.yaml) calls a
# local Authentik proxy outpost; unauthenticated requests are redirected to
# https://authentik.senseivision.ai to log in (passkey or password+TOTP, from
# Bitwarden), then back. Access is restricted to the Authentik `herdr` group.
#
# Two routes on the same host: /outpost.goauthentik.io/ → the outpost (the auth
# callback/static, NO middleware), everything else → herdr-web (WITH the
# middleware). This needs Traefik IngressRoute (per-route middleware), so TLS is
# provisioned by an explicit cert-manager Certificate instead of the ingress
# annotation.
#
# Backend: selector-less Service + manual Endpoints → the herdr-web front-door
# over the tailnet (currently work-vm-01 100.72.0.46; vm-00 is down — repoint to
# 100.72.0.8 when it's back for fleet aggregation).
apiVersion: v1
kind: Service
metadata:
  name: herdr-web
  namespace: lamg
spec:
  ports:
    - name: http
      port: 8787
      targetPort: 8787
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: herdr-web
  namespace: lamg
subsets:
  - addresses:
      - ip: 100.72.0.46       # work-vm-01 (vm-00 front-door is DOWN; repoint to 100.72.0.8 when back)
    ports:
      - name: http
        port: 8787
        protocol: TCP
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: herdr.${BASE_DOMAIN}
  namespace: lamg
spec:
  secretName: herdr.${BASE_DOMAIN}
  dnsNames:
    - herdr.${BASE_DOMAIN}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: herdr
  namespace: lamg
spec:
  entryPoints:
    - websecure
  routes:
    # Authentik outpost endpoints (auth start / callback / static) — no auth.
    - kind: Rule
      match: Host(`herdr.${BASE_DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io/`)
      priority: 20
      services:
        - name: herdr-outpost
          port: 9000
    # The app — gated by the Authentik forward-auth middleware.
    - kind: Rule
      match: Host(`herdr.${BASE_DOMAIN}`)
      priority: 10
      middlewares:
        - name: herdr-authentik
      services:
        - name: herdr-web
          port: 8787
  tls:
    secretName: herdr.${BASE_DOMAIN}
