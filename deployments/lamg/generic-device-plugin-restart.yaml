apiVersion: v1
kind: ServiceAccount
metadata:
  name: generic-device-plugin-restarter
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: generic-device-plugin-restarter
  namespace: kube-system
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    resourceNames: ["generic-device-plugin"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: generic-device-plugin-restarter
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: generic-device-plugin-restarter
subjects:
  - kind: ServiceAccount
    name: generic-device-plugin-restarter
    namespace: kube-system
---
# Hourly bounce of generic-device-plugin to clear stale listwatch state
# that leaves consumer pods stuck in UnexpectedAdmissionError.
# Plugin restart is transparent to running consumer pods (verified 2026-05-26).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: generic-device-plugin-restart
  namespace: kube-system
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: generic-device-plugin-restarter
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.34
              command:
                - kubectl
                - -n
                - kube-system
                - rollout
                - restart
                - daemonset/generic-device-plugin
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
