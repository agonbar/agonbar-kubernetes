apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: zigbee2mqtt
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: zigbee2mqtt
  namespace: lamg
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: zigbee2mqtt
  template:
    metadata:
      labels:
        app: zigbee2mqtt
    spec:
      containers:
        - image: koenkk/zigbee2mqtt:latest
          name: zigbee2mqtt
          env:
            - name: TZ
              value: Europe/Madrid
          volumeMounts:
            - name: config
              mountPath: /app/data
          ports:
            - containerPort: 8080
              name: zigbee2mqtt
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
              devices/sonoffzigbeedongle: "1"
            limits:
              devices/sonoffzigbeedongle: "1"
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: zigbee2mqtt-config
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
      dnsConfig:
        options:
          - name: ndots
            value: "1"

---
kind: Service
apiVersion: v1
metadata:
  name: zigbee2mqtt
  namespace: lamg
  labels:
    svccontroller.k3s.cattle.io/lbpool: lamg
spec:
  type: LoadBalancer
  selector:
    app: zigbee2mqtt
  ports:
    - name: zigbee2mqtt
      port: 8080
      protocol: TCP
      targetPort: 8080

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zigbee2mqtt-config
  namespace: lamg
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 1Gi