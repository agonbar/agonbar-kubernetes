apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: homeassistant
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: homeassistant
  namespace: lamg
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
        app.vscode: "true"
    spec:
      initContainers:
        - name: iscsi-fsck
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MOUNTPOINT="/config"
              echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."

              if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                rm -f "${MOUNTPOINT}/.rw-test"
                echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                exit 0
              fi

              echo "[iscsi-fsck] Filesystem is READ-ONLY. Starting repair..."
              apk add --no-cache e2fsprogs util-linux 2>/dev/null

              DEVICE=$(grep " ${MOUNTPOINT} " /proc/mounts | awk '{print $1}' | head -1)

              if [ -z "${DEVICE}" ]; then
                echo "[iscsi-fsck] ERROR: Could not find block device for ${MOUNTPOINT}."
                echo "[iscsi-fsck] Host mount table (iscsi/sd entries):"
                grep -E "iscsi|/dev/sd|democratic-csi" /host-proc-mounts || true
                exit 1
              fi

              echo "[iscsi-fsck] Found device: ${DEVICE}"
              echo "[iscsi-fsck] Attempting remount rw..."
              if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null; then
                if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                  rm -f "${MOUNTPOINT}/.rw-test"
                  echo "[iscsi-fsck] Remount rw succeeded!"
                  exit 0
                fi
              fi

              echo "[iscsi-fsck] Simple remount failed. Running e2fsck..."
              GLOBAL_MOUNT=$(grep "${DEVICE} " /host-proc-mounts | grep globalmount | awk '{print $2}' | head -1)
              if [ -z "${GLOBAL_MOUNT}" ]; then
                GLOBAL_MOUNT=$(grep "^${DEVICE} " /host-proc-mounts | awk '{print $2}' | head -1)
              fi

              if [ -n "${GLOBAL_MOUNT}" ]; then
                echo "[iscsi-fsck] Unmounting ${GLOBAL_MOUNT} for fsck..."
                umount -l "${GLOBAL_MOUNT}" || echo "[iscsi-fsck] WARNING: umount failed, trying to fsck anyway..."
              fi

              e2fsck -y -f "${DEVICE}" || {
                FSCK_EXIT=$?
                if [ $FSCK_EXIT -gt 2 ]; then
                  echo "[iscsi-fsck] e2fsck failed with exit code ${FSCK_EXIT}."
                  exit 1
                fi
              }

              if [ -n "${GLOBAL_MOUNT}" ]; then
                mount "${DEVICE}" "${GLOBAL_MOUNT}" || {
                  echo "[iscsi-fsck] Mount failed after fsck. Triggering pod restart."
                  exit 1
                }
              fi

              if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                rm -f "${MOUNTPOINT}/.rw-test"
                echo "[iscsi-fsck] SUCCESS: Filesystem repaired and writable."
                exit 0
              else
                echo "[iscsi-fsck] FAILED: Filesystem still not writable after repair."
                exit 1
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: host-proc-mounts
              mountPath: /host-proc-mounts
      containers:
        - image: homeassistant/home-assistant:latest
          name: homeassistant
          ports:
            - containerPort: 8123
              name: homeassistant
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
        - image: ghcr.io/linuxserver/code-server
          name: vscode
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: 'Europe/Madrid'
            - name: SUDO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lamg
                  key: sudoPassword
            - name: DEFAULT_WORKSPACE
              value: '/config/workspace'
          ports:
            - containerPort: 8443
              name: vscode
              protocol: TCP
          volumeMounts:
            - name: vscode-config
              mountPath: /config
            - name: config
              mountPath: /config/workspace
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
        - name: vscode-config
          persistentVolumeClaim:
            claimName: vscode-config
        - name: host-proc-mounts
          hostPath:
            path: /proc/1/mounts
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg

---
kind: Service
apiVersion: v1
metadata:
  name: homeassistant
  namespace: lamg
  labels:
    svccontroller.k3s.cattle.io/lbpool: lamg
spec:
  type: LoadBalancer
  selector:
    app: homeassistant
  ports:
    - protocol: TCP
      port: 8123
      targetPort: 8123
      name: homeassistant

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant-https
  namespace: lamg
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: home.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123
  tls:
    - secretName: home.${BASE_DOMAIN}
      hosts:
        - home.${BASE_DOMAIN}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homeassistant-config
  namespace: lamg
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 30Gi
