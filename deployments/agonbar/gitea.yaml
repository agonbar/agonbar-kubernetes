apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gitea
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: gitea
  namespace: agonbar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
        - image: codeberg.org/forgejo/forgejo:14.0
          name: forgejo
          env:
            - name: USER_UID
              value: '1000'
            - name: USER_GID
              value: '1000'
          ports:
            - containerPort: 3000
              name: gitea
              protocol: TCP
            - containerPort: 22
              name: ssh
              protocol: TCP
          volumeMounts:
            - name: gitea
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
      - name: gitea
        hostPath:
          path: /docker/gitea
          type: Directory
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: gitea
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: gitea

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: gitea

---
kind: Service
apiVersion: v1
metadata:
  name: gitea-lb
  namespace: agonbar
spec:
  type: LoadBalancer

  selector:
    app: gitea

  ports:
    - protocol: TCP
      port: 222
      targetPort: 22
      name: gitea

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitea-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: gitea.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: gitea
                port:
                  number: 3000
  tls:
    - secretName: gitea.${BASE_DOMAIN}
      hosts:
        - gitea.${BASE_DOMAIN}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: git-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: git.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: gitea
                port:
                  number: 3000
  tls:
    - secretName: git.${BASE_DOMAIN}
      hosts:
        - git.${BASE_DOMAIN}

