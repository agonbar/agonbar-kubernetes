apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: paperless
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: paperless
  namespace: agonbar
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      enableServiceLinks: false
      containers:
        - image: docker.io/library/redis:6.2-alpine
          name: broker
          ports:
            - containerPort: 6379
              name: broker
              protocol: TCP
          volumeMounts:
            - name: redis
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
        - image: ghcr.io/paperless-ngx/paperless-ngx:latest
          name: webserver
          env:
            - name: PAPERLESS_URL
              value: https://paperless.${BASE_DOMAIN}
            - name: PAPERLESS_REDIS
              value: redis://localhost:6379
            - name: PAPERLESS_OCR_LANGUAGE
              value: spa+eng
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agonbar
                  key: paperlessSecretKey
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: agonbar
                  key: paperlessUser
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agonbar
                  key: paperlessPassword
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GUID
              value: "1000"
          ports:
            - containerPort: 8000
              name: webserver
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: export
              mountPath: /usr/src/paperless/export
            - name: consume
              mountPath: /usr/src/paperless/consume
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
      - name: redis
        persistentVolumeClaim:
          claimName: paperless-redis
      - name: data
        persistentVolumeClaim:
          claimName: paperless-data
      - name: media
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/paperless/media
      - name: export
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/paperless/export
      - name: consume
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/paperless/consume
      imagePullSecrets:
        - name: dockerhub-secret
      nodeSelector:
        kubernetes.io/arch: amd64
        svccontroller.k3s.cattle.io/lbpool: lamg

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-redis
  namespace: agonbar
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  namespace: agonbar
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 5Gi

---
kind: Service
apiVersion: v1
metadata:
  name: paperless
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: paperless

  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: paperless

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperless-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: paperless.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: paperless
                port:
                  number: 8000
  tls:
    - secretName: paperless.${BASE_DOMAIN}
      hosts:
        - paperless.${BASE_DOMAIN}
