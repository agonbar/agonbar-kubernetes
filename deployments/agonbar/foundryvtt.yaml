apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: foundryvtt
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: foundryvtt
  namespace: agonbar
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: foundryvtt
  template:
    metadata:
      labels:
        app: foundryvtt
    spec:
      containers:
        - image: felddy/foundryvtt:release
          name: foundryvtt
          env:
            - name: TZ
              value: Europe/Madrid
            - name: CONTAINER_PRESERVE_CONFIG
              value: "true"
            - name: FOUNDRY_HOSTNAME
              value: foundryvtt.${AMANDA_DOMAIN}
            - name: FOUNDRY_PROXY_SSL
              value: "true"
            - name: FOUNDRY_PROXY_PORT
              value: "443"
            - name: FOUNDRY_MINIFY_STATIC_FILES
              value: "true"
            - name: FOUNDRY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: foundryvtt
                  key: username
            - name: FOUNDRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: foundryvtt
                  key: password
            - name: FOUNDRY_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: foundryvtt
                  key: licenseKey
            - name: FOUNDRY_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: foundryvtt
                  key: adminKey
          ports:
            - containerPort: 30000
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /game
              port: 30000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /game
              port: 30000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          hostPath:
            path: /docker/foundryvtt
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
apiVersion: v1
kind: Service
metadata:
  name: foundryvtt
  namespace: agonbar
spec:
  type: ClusterIP
  selector:
    app: foundryvtt
  ports:
    - name: http
      protocol: TCP
      port: 30000
      targetPort: 30000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foundryvtt-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: foundryvtt.${AMANDA_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: foundryvtt
                port:
                  number: 30000
  tls:
    - secretName: foundryvtt.${AMANDA_DOMAIN}
      hosts:
        - foundryvtt.${AMANDA_DOMAIN}
