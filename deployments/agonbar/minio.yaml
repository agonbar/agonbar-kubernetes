apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: minio
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: minio
  namespace: agonbar
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - image: minio/minio:RELEASE.2022-10-24T18-35-07Z
          name: minio
          command: ["minio"]
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: agonbar
                  key: minioRootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agonbar
                  key: minioRootPassword
            - name: MINIO_DOMAIN
              value: 'https://minio.${BASE_DOMAIN}'
            - name: MINIO_BROWSER_REDIRECT_URL
              value: 'https://minioconsole.${BASE_DOMAIN}'  
          ports:
            - containerPort: 9000
              name: minio
              protocol: TCP
            - containerPort: 9001
              name: minioconsole
              protocol: TCP    
          volumeMounts:
            - name: minio
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
      - name: minio
        persistentVolumeClaim:
          claimName: minio-data
      imagePullSecrets:
        - name: dockerhub-secret

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: agonbar
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 10Gi

---
kind: Service
apiVersion: v1
metadata:
  name: minio
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: minio

  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
      name: minio
    - protocol: TCP
      port: 9001
      targetPort: 9001
      name: minioconsole   


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: minio.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: minio
                port:
                  number: 9000
  tls:
    - secretName: minio.${BASE_DOMAIN}
      hosts:
        - minio.${BASE_DOMAIN}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minioconsole-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: minioconsole.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: minio
                port:
                  number: 9001
  tls:
    - secretName: minioconsole.${BASE_DOMAIN}
      hosts:
        - minioconsole.${BASE_DOMAIN}
