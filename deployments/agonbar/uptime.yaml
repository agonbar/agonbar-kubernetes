apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: uptime
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: uptime
  namespace: agonbar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime
  template:
    metadata:
      labels:
        app: uptime
    spec:
      containers:
        - image: louislam/uptime-kuma:1
          name: uptime
          ports:
            - containerPort: 3001
              name: uptime
              protocol: TCP
          volumeMounts:
            - name: uptime
              mountPath: /app/data
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
      - name: uptime
        hostPath:
          path: /docker/uptime
          type: Directory
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: uptime
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: uptime

  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
      name: uptime


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: uptime.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: uptime
                port:
                  number: 3001
  tls:
    - secretName: uptime.${BASE_DOMAIN}
      hosts:
        - uptime.${BASE_DOMAIN}