apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: espuma-chat
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: espuma-chat
  namespace: agonbar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: espuma-chat
  template:
    metadata:
      labels:
        app: espuma-chat
    spec:
      containers:
        - image: agonbar/espuma-chat:latest
          name: espuma-chat
          ports:
            - containerPort: 3000
              name: espuma-chat
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      nodeSelector:
        kubernetes.io/arch: amd64
        svccontroller.k3s.cattle.io/lbpool: lamg
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: espuma-chat
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: espuma-chat

  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      name: espuma-chat


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: espuma-chat-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: espuma-chat.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: espuma-chat
                port:
                  number: 3000
  tls:
    - secretName: espuma-chat.${BASE_DOMAIN}
      hosts:
        - espuma-chat.${BASE_DOMAIN}