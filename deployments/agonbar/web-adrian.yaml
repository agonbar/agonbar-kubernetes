apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: web-adrian
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: web-adrian
  namespace: agonbar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-adrian
  template:
    metadata:
      labels:
        app: web-adrian
    spec:
      containers:
        - image: nginx:mainline-alpine
          name: web-adrian
          ports:
            - containerPort: 80
              name: web-adrian
              protocol: TCP
          volumeMounts:
            - name: web-adrian
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
      - name: web-adrian
        hostPath:
          path: /var/www/${BASE_DOMAIN}/html/
          type: Directory
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: web-adrian
  namespace: agonbar
spec:
  type: NodePort

  selector:
    app: web-adrian

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: web-adrian


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-adrian-https
  namespace: agonbar
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: ${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: web-adrian
                port:
                  number: 80
  tls:
    - secretName: ${BASE_DOMAIN}
      hosts:
        - ${BASE_DOMAIN}