apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: factorio
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: factorio
  namespace: games
spec:
  strategy:
    type: Recreate
  replicas: 0
  selector:
    matchLabels:
      app: factorio
  template:
    metadata:
      labels:
        app: factorio
    spec:
      containers:
        - image: ofsm/ofsm:latest
          name: factorio
          ports:
            - containerPort: 80
              name: factorio-1
              protocol: TCP
            - containerPort: 34197
              name: factorio-2
              protocol: UDP
          env:
            - name: FACTORIO_VERSION
              value: stable
            - name: RCON_PASS
              value: ""
            - name: ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: games
                  key: factorioUser
            - name: ADMIN_PASS
              valueFrom:
                secretKeyRef:
                  name: games
                  key: factorioPassword
          volumeMounts:
            - name: data
              mountPath: /opt/fsm-data
              subPath: fsm-data
            - name: data
              mountPath: /opt/factorio/saves
              subPath: saves
            - name: data
              mountPath: /opt/factorio/mods
              subPath: mods
            - name: data
              mountPath: /opt/factorio/config
              subPath: config
            - name: data
              mountPath: /opt/fsm/mod_packs
              subPath: mod_packs
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: factorio-data
      nodeSelector:
        kubernetes.io/arch: amd64
        svccontroller.k3s.cattle.io/lbpool: lamg
      imagePullSecrets:
        - name: registry-secret

---
kind: Service
apiVersion: v1
metadata:
  name: factorio
  namespace: games
spec:
  type: NodePort

  selector:
    app: factorio

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: factorio
---
apiVersion: v1
kind: Service
metadata:
  name: factorio-server
  namespace: games
spec:
  type: LoadBalancer
  ports:
    - name: factorio
      protocol: UDP
      port: 34197
      targetPort: 34197
  selector:
    app: factorio

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: factorio-https
  namespace: games
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: factorio.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: factorio
                port:
                  number: 80
  tls:
    - secretName: factorio.${BASE_DOMAIN}
      hosts:
        - factorio.${BASE_DOMAIN}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: factorio-data
  namespace: games
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 10Gi
