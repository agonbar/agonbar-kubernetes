---
# /turn on the SAME origin as the app hands out the ephemeral TURN credentials
# (same-origin on purpose, so the browser needs no CORS). This is a SEPARATE
# Ingress from the web catch-all below, and NOT because it's tidier: Traefik
# orders routers by the length of the generated rule string, so the web app's
# `PathPrefix(`/`)` (longer) would otherwise out-prioritise `Path(`/turn`)` and
# swallow /turn. A dedicated Ingress lets us pin a high router.priority to /turn
# alone so it wins.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tessera-turn
  namespace: tessera
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.priority: "1000"
spec:
  ingressClassName: traefik
  rules:
    - host: tessera.${BASE_DOMAIN}
      http:
        paths:
          - path: /turn
            pathType: Exact
            backend:
              service:
                name: turn-creds
                port:
                  number: 8080
  tls:
    - hosts:
        - tessera.${BASE_DOMAIN}
      secretName: tessera.${BASE_DOMAIN}
---
# The app itself. Catch-all prefix, lower (default) priority than /turn above.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tessera
  namespace: tessera
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: tessera.${BASE_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 8080
  tls:
    - hosts:
        - tessera.${BASE_DOMAIN}
      secretName: tessera.${BASE_DOMAIN}
---
# The y-webrtc signaling websocket. Traefik upgrades ws/wss natively, so no
# extra annotation is needed; the client dials wss://signal-tessera.${BASE_DOMAIN}.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signaling
  namespace: tessera
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: signal-tessera.${BASE_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: signaling
                port:
                  number: 4444
  tls:
    - hosts:
        - signal-tessera.${BASE_DOMAIN}
      secretName: signal-tessera.${BASE_DOMAIN}
