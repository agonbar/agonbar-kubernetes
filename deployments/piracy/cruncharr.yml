apiVersion: apps/v1
kind: Deployment
metadata:
  name: cruncharr-deployment
  namespace: piracy
  labels:
    app: cruncharr
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: cruncharr
  template:
    metadata:
      labels:
        app: cruncharr
    spec:
      containers:
        - name: cruncharr
          image: ghcr.io/agonbar/cruncharr:latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: Europe/Madrid
            - name: ANIDL_CRUNCHYROLL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: cruncharr
                  key: crunchyroll-username
            - name: ANIDL_CRUNCHYROLL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cruncharr
                  key: crunchyroll-password
            - name: ANIDL_GUI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cruncharr
                  key: gui-password
            - name: ANIDL_SONARR_ENABLED
              value: "true"
            - name: ANIDL_SONARR_FANSUB
              value: "Cruncharr"
            - name: ANIDL_DIR_CONTENT
              value: /downloads/cruncharr
            - name: ANIDL_DIR_TRASH
              value: /downloads/cruncharr/_trash
          ports:
            - containerPort: 3000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /data/config
            - name: downloads
              mountPath: /downloads
          livenessProbe:
            httpGet:
              path: /api/app/status
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 60
            # Bun's event loop blocks for several seconds when shaka-packager /
            # mp4decrypt / mkvmerge subprocesses are spawned, so the probe
            # needs a long timeout to avoid spurious kills under load.
            timeoutSeconds: 60
            failureThreshold: 5
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: cruncharr-config
        - name: downloads
          # nas02 is the same TrueNAS as 192.168.0.29 — using the tailnet
          # hostname lets the pod schedule on encoder VMs in the aya LAN
          # which only reach the NAS over tailnet.
          nfs:
            server: nas02
            path: /mnt/SSD/torrents/
      nodeSelector:
        workload: media
      tolerations:
        - {key: dedicated, operator: Equal, value: media, effect: NoSchedule}
---
apiVersion: v1
kind: Service
metadata:
  name: cruncharr
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 3000
      targetPort: 3000
  selector:
    app: cruncharr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cruncharr-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: cruncharr.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: cruncharr
                port:
                  number: 3000
  tls:
    - secretName: cruncharr.${BASE_DOMAIN}
      hosts:
        - cruncharr.${BASE_DOMAIN}
---
# Config volume: an iSCSI zvol on the TrueNAS box (192.168.0.29 on the LAN,
# 100.72.0.41 over the tailnet).
#
# This one CANNOT be migrated to truenas-iscsi-ssd-lan the way every other PVC in
# this namespace was. cruncharr is pinned to workload=media nodes (they're the
# ones that reach the media NFS), and those nodes sit in the aya LAN: they have
# no route to 192.168.0.29 (verified — TCP to the LAN portal times out, the
# tailnet portal answers). That is also why the -lan CSI *node* DaemonSet only
# schedules on lbpool=lamg nodes: the LAN portal is only usable from the LAN.
# So this volume must keep using the tailnet portal.
#
# Statically bound with Retain, so the zvol can't be reclaimed by accident — it
# used to be a dynamic PV with reclaimPolicy: Delete, one `kubectl delete pvc`
# away from destroying the database.
#
# KNOWN FRAGILITY: iSCSI over a WireGuard tunnel drops on network blips
# (`connection1:0: detected conn error (1022)`). In-flight writes then fail, ext4
# aborts its journal and remounts the filesystem read-only, every SQLite write
# returns "disk I/O error", and the download-queue breaker stops the queue after
# 5 consecutive failures. This happened on 2026-07-11.
# Recovery: restart the pod — the CSI re-attach runs `fsck -a`, which replays the
# journal and clears the error state — then resume the queue from the dashboard.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cruncharr-config-tailnet
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd
  claimRef:
    namespace: piracy
    name: cruncharr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd
    fsType: ext4
    volumeHandle: pvc-302fd00d-11ef-4af7-9a7d-b96a46ce4cf4
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "100.72.0.41:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-302fd00d-11ef-4af7-9a7d-b96a46ce4cf4-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cruncharr-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  volumeName: cruncharr-config-tailnet
  resources:
    requests:
      storage: 2Gi
