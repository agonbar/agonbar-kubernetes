apiVersion: apps/v1
kind: Deployment
metadata:
    annotations:
        keel.sh/pollSchedule: "@every 72h"
    name: bazarr-deployment
    namespace: piracy
    labels:
        app: bazarr
        keel.sh/policy: force
        keel.sh/match-tag: "true"
        keel.sh/trigger: poll
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: bazarr
    template:
        metadata:
            labels:
                app: bazarr
        spec:
            containers:
                - name: bazarr
                  image: linuxserver/bazarr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: PGID
                        value: '1000'
                      - name: PUID
                        value: '1000'
                      - name: TZ
                        value: Europe/Madrid
                  ports:
                      - containerPort: 6767
                        protocol: TCP
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: downloads
                        mountPath: /downloads
                      - name: tv
                        mountPath: /tv
                      # Si también tienes películas (Radarr), deberías añadir ese volumen aquí
                  resources:
                      requests:
                          memory: 256Mi # Bazarr consume un poco más de RAM al indexar
                          cpu: 100m
                      limits:
                          memory: 1Gi
                          cpu: 500m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: bazarr-config
                - name: tv
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media/tv
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 6767
      targetPort: 6767
  selector:
    app: bazarr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bazarr-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: bazarr.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: bazarr
                port:
                  number: 6767
  tls:
    - secretName: bazarr.${BASE_DOMAIN}
      hosts:
        - bazarr.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: bazarr-config-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: bazarr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-50655a43-894d-47c2-8405-6f4ca407701f
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-50655a43-894d-47c2-8405-6f4ca407701f-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazarr-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: bazarr-config-lan
  resources:
    requests:
      storage: 5Gi
