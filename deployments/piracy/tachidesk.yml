apiVersion: apps/v1
kind: Deployment
metadata:
    name: tachidesk-deployment # <--- change this
    namespace: piracy
    labels:
        app: tachidesk # <--- change this to match label on the pod
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: tachidesk # <--- change this to match label on the pod
    template:
        metadata:
            labels:
                app: tachidesk
        spec:
            dnsPolicy: "None"
            dnsConfig:
                nameservers:
                    - 1.1.1.1
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/tachidesk-data"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: data
                        mountPath: /tachidesk-data
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
                - name: fix-permissions
                  image: busybox:latest
                  command: ["sh", "-c", "chown -R 1000:1000 /home/suwayomi/.local/share/Tachidesk"]
                  volumeMounts:
                      - name: data
                        mountPath: /home/suwayomi/.local/share/Tachidesk
            containers:
                - name: tachidesk
                  # Pinned for GitOps reproducibility (was floating :stable).
                  # Bump deliberately; v2.x->v2.y runs SQLite migrations on boot.
                  image: ghcr.io/suwayomi/tachidesk:v2.2.2100
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 4567
                        protocol: TCP
                  volumeMounts:
                      - name: data
                        mountPath: /home/suwayomi/.local/share/Tachidesk
                      # Shared manga library = a subdir of the media NFS export.
                      # Set Suwayomi's downloadsPath to /media/manga in the web UI
                      # so raws land where mokuro-ocr can read them.
                      - name: manga
                        mountPath: /media
                  startupProbe:
                      httpGet:
                          path: /
                          port: 4567
                      # Suwayomi's JCEF/Chromium cold boot can take >5min on a
                      # slow node after downtime; give it 10min before restarting
                      # (it bound :4567 only after WebUI+JCEF init in testing).
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 60
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 4567
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 4567
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 512Mi
                          cpu: 250m
                      limits:
                          # Was 100m — far too tight: Suwayomi + its embedded
                          # JCEF/Chromium got CPU-throttled to a crawl (cgroup
                          # throttled_time ~1223s), making JCEF boot take ~9min
                          # and WebUI GraphQL queries 13-24s ("loading forever"
                          # on the Extensions page). Allow bursting to 2 cores.
                          memory: 2Gi
                          cpu: "2"
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: tachidesk-data
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
                - name: manga
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg

---
kind: Service
apiVersion: v1
metadata:
  name: tachidesk
  namespace: piracy
spec:
  type: NodePort

  selector:
    app: tachidesk

  ports:
    - protocol: TCP
      port: 4567
      targetPort: 4567
      name: tachidesk


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tachidesk-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: tachidesk.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: tachidesk
                port:
                  number: 4567
  tls:
    - secretName: tachidesk.${BASE_DOMAIN}
      hosts:
        - tachidesk.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tachidesk-data-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: tachidesk-data
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-3c8c1195-7c93-458e-9f88-9e1a3602b97d
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-3c8c1195-7c93-458e-9f88-9e1a3602b97d-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tachidesk-data
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: tachidesk-data-lan
  resources:
    requests:
      storage: 5Gi
