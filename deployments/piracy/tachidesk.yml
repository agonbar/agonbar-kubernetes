apiVersion: apps/v1
kind: Deployment
metadata:
    name: tachidesk-deployment # <--- change this
    namespace: piracy
    labels:
        app: tachidesk # <--- change this to match label on the pod
spec:
    strategy:
        type: Recreate
    replicas: 0
    selector:
        matchLabels:
            app: tachidesk # <--- change this to match label on the pod
    template:
        metadata:
            labels:
                app: tachidesk
        spec:
            dnsPolicy: "None"
            dnsConfig:
                nameservers:
                    - 1.1.1.1
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/tachidesk-data"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY. Starting repair..."
                        apk add --no-cache e2fsprogs util-linux 2>/dev/null
                        DEVICE=$(grep " ${MOUNTPOINT} " /host-proc-mounts | awk '{print $1}' | head -1)
                        if [ -z "${DEVICE}" ]; then
                          echo "[iscsi-fsck] ERROR: Could not find block device for ${MOUNTPOINT}."
                          grep -E "iscsi|/dev/sd|democratic-csi" /host-proc-mounts || true
                          exit 1
                        fi
                        echo "[iscsi-fsck] Found device: ${DEVICE}"
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null; then
                          if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                            rm -f "${MOUNTPOINT}/.rw-test"
                            echo "[iscsi-fsck] Remount rw succeeded."
                            exit 0
                          fi
                        fi
                        echo "[iscsi-fsck] Running e2fsck on ${DEVICE}..."
                        GLOBAL_MOUNT=$(grep "^${DEVICE} " /host-proc-mounts | awk '{print $2}' | head -1)
                        if [ -n "${GLOBAL_MOUNT}" ]; then
                          umount -l "${GLOBAL_MOUNT}" || true
                        fi
                        e2fsck -y -f "${DEVICE}" || true
                        if [ -n "${GLOBAL_MOUNT}" ]; then
                          mount "${DEVICE}" "${GLOBAL_MOUNT}" || { echo "[iscsi-fsck] Mount failed."; exit 1; }
                        fi
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] SUCCESS: Filesystem repaired."
                          exit 0
                        fi
                        echo "[iscsi-fsck] FAILED: Still read-only after repair."
                        exit 1
                  volumeMounts:
                      - name: data
                        mountPath: /tachidesk-data
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
                - name: fix-permissions
                  image: busybox:latest
                  command: ["sh", "-c", "chown -R 1000:1000 /home/suwayomi/.local/share/Tachidesk"]
                  volumeMounts:
                      - name: data
                        mountPath: /home/suwayomi/.local/share/Tachidesk
            containers:
                - name: tachidesk
                  image: ghcr.io/suwayomi/tachidesk:stable
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 4567
                        protocol: TCP
                  volumeMounts:
                      - name: data
                        mountPath: /home/suwayomi/.local/share/Tachidesk
                  startupProbe:
                      httpGet:
                          path: /api/v1/settings/about
                          port: 4567
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 30
                  livenessProbe:
                      httpGet:
                          path: /api/v1/settings/about
                          port: 4567
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /api/v1/settings/about
                          port: 4567
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 1Gi
                          cpu: 100m
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: tachidesk-data
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg

---
kind: Service
apiVersion: v1
metadata:
  name: tachidesk
  namespace: piracy
spec:
  type: NodePort

  selector:
    app: tachidesk

  ports:
    - protocol: TCP
      port: 4567
      targetPort: 4567
      name: tachidesk


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tachidesk-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: tachidesk.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: tachidesk
                port:
                  number: 4567
  tls:
    - secretName: tachidesk.${BASE_DOMAIN}
      hosts:
        - tachidesk.${BASE_DOMAIN}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tachidesk-data
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 5Gi
