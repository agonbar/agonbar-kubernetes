apiVersion: apps/v1
kind: Deployment
metadata:
    name: houndarr-deployment
    namespace: piracy
    labels:
        app: houndarr
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: houndarr
    template:
        metadata:
            labels:
                app: houndarr
        spec:
            enableServiceLinks: false
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/data"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: houndarr
                  image: ghcr.io/av1155/houndarr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: PGID
                        value: '950'
                      - name: PUID
                        value: '950'
                      - name: TZ
                        value: Europe/Madrid
                  ports:
                      - containerPort: 8877
                        protocol: TCP
                  volumeMounts:
                      - name: data
                        mountPath: /data
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 1Gi
                          cpu: 500m
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: houndarr-data
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
                svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
  name: houndarr
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 8877
      targetPort: 8877
  selector:
    app: houndarr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: houndarr-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: houndarr.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: houndarr
                port:
                  number: 8877
  tls:
    - secretName: houndarr.${BASE_DOMAIN}
      hosts:
        - houndarr.${BASE_DOMAIN}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: houndarr-data
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 5Gi
