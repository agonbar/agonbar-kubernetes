# Tdarr distributed worker, runs as a DaemonSet on every node labelled
# workload=media (work-vm-{00,01,02}).
#
# Each pod registers as ${HOSTNAME}-pod (downward API) so the server sees
# them as distinct nodes. CPU limit is ~80% of an 8c/16t Ryzen 7 7700.
#
# The pod contains TWO containers:
#   tdarr-node     — upstream worker, untouched (so tdarr_node version
#                    bumps flow through without a re-build on our side).
#   vmaf-sidecar   — our image; publishes a libvmaf-capable ffmpeg +
#                    the vmaf-window CLI into the pod-shared /sidecar
#                    emptyDir. The Tdarr_Plugin_anime_av1_vmaf_gate
#                    plugin shells out to /sidecar/bin/vmaf-window
#                    after the AV1 transcode produces its output.
#                    See tdarr/docs/DESIGN-vmaf-sidecar.md.
#
# GPU note: NVENC/NVDEC is NOT enabled. The cluster has no NVIDIA
# container runtime configured (k3s/containerd default runtime + no
# nvidia-device-plugin). To enable GPU acceleration later: install
# nvidia-container-toolkit on the work-vm hosts (NixOS), wire it as a
# k3s containerd runtime, deploy nvidia-device-plugin, then add
# `resources.limits.nvidia.com/gpu: 1` here. Until then the bundled
# libsvtav1 / libx265 CPU encoders work fine.
apiVersion: apps/v1
kind: DaemonSet
metadata:
    name: tdarr-node
    namespace: piracy
    labels:
        app: tdarr-node
spec:
    selector:
        matchLabels:
            app: tdarr-node
    template:
        metadata:
            labels:
                app: tdarr-node
        spec:
            enableServiceLinks: false
            nodeSelector:
                workload: media
            tolerations:
                - key: dedicated
                  operator: Equal
                  value: media
                  effect: NoSchedule
            imagePullSecrets:
                - name: ghcr-agonbar
            containers:
                - name: tdarr-node
                  image: ghcr.io/haveagitgat/tdarr_node:2.70.01
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: TZ
                        value: Europe/Madrid
                      - name: PUID
                        value: '950'
                      - name: PGID
                        value: '950'
                      - name: UMASK_SET
                        value: '002'
                      # Use the host's k8s node name as a stable suffix for the
                      # Tdarr nodeName so each pod registers separately.
                      - name: NODE_HOSTNAME
                        valueFrom:
                            fieldRef:
                                fieldPath: spec.nodeName
                      - name: nodeName
                        value: $(NODE_HOSTNAME)-pod
                      - name: serverIP
                        value: 100.72.0.16
                      - name: serverPort
                        value: '8266'
                      - name: serverURL
                        value: ''
                      - name: inContainer
                        value: 'true'
                      - name: apiKey
                        valueFrom:
                            secretKeyRef:
                                name: tdarr
                                key: seeded-api-key
                  volumeMounts:
                      - name: configs
                        mountPath: /app/configs
                      - name: media
                        mountPath: /media
                      - name: sidecar
                        mountPath: /sidecar
                  resources:
                      requests:
                          memory: 1Gi
                          cpu: 1000m
                      limits:
                          # Capped to fit the 18Gi/16cpu work-vm-* media nodes. The prior
                          # 100Gi/12 limit was fiction: Tdarr's parallel ffmpeg transcodes
                          # exhausted real node RAM, causing node-level OOM resets that took
                          # down cruncharr (colocated) and corrupted its SQLite DB. An 8Gi
                          # cgroup cap contains Tdarr to a cgroup-OOM instead of nuking the node.
                          memory: 8Gi
                          cpu: '6'
                # vmaf-sidecar: at startup, copies static-ffmpeg / ffprobe /
                # vmaf-window into the shared /sidecar emptyDir, then idles.
                # When the plugin shells out to /sidecar/bin/vmaf-window from
                # the tdarr-node container, the resulting ffmpeg runs INSIDE
                # the tdarr-node container's cgroup (the exec'er) — so the
                # sidecar's resource limits only need to cover the file copy
                # and the sleep. Keep it tiny.
                - name: vmaf-sidecar
                  image: ghcr.io/agonbar/tdarr-vmaf-sidecar:latest
                  imagePullPolicy: Always
                  volumeMounts:
                      - name: sidecar
                        mountPath: /sidecar
                  resources:
                      requests:
                          memory: 32Mi
                          cpu: 10m
                      limits:
                          memory: 128Mi
                          cpu: 100m
            volumes:
                - name: configs
                  emptyDir: {}
                - name: sidecar
                  emptyDir: {}
                # Library cache lives on the same NFS share as /media so the
                # server pod's cacheCopyService can see the post-transcode
                # files (server runs the move from cache → output folder).
                # Configure each library with cache: /media/tdarr-cache.
                - name: media
                  nfs:
                      server: 100.72.0.41
                      path: /mnt/RAID/docker/media
