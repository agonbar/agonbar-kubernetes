apiVersion: apps/v1
kind: Deployment
metadata:
    name: sonarr-deployment # <--- change this
    namespace: piracy
    labels:
        app: sonarr # <--- change this to match label on the pod
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: sonarr # <--- change this to match label on the pod
    template:
        metadata:
            labels:
                app: sonarr
        spec:
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/config"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: sonarr
                  image: linuxserver/sonarr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: PGID
                        value: '950'
                      - name: PUID
                        value: '950'
                      - name: TZ
                        value: Europe/Madrid
                  ports:
                      - containerPort: 8989
                        protocol: TCP
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: downloads
                        mountPath: /downloads
                      - name: tv
                        mountPath: /tv
                      - name: series
                        mountPath: /SERIES
                  livenessProbe:
                      httpGet:
                          path: /ping
                          port: 8989
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 30
                      failureThreshold: 6
                  readinessProbe:
                      httpGet:
                          path: /ping
                          port: 8989
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 10
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 100m
                      limits:
                          memory: "2.5Gi"
                          cpu: 2000m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: sonarr-config
                - name: tv
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media/tv
                - name: series
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media/SERIES
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 8989
      targetPort: 8989
  selector:
    app: sonarr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sonarr-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: sonarr.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: sonarr
                port:
                  number: 8989
  tls:
    - secretName: sonarr.${BASE_DOMAIN}
      hosts:
        - sonarr.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29) to stop the recurring read-only/corruption
# from iSCSI-over-Tailscale session drops. Statically bound to the retained zvol
# (same TrueNAS target, only the network path changed). See democratic-csi-iscsi-ssd-lan.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-config-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: sonarr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-d444266d-b8c0-40dc-8fb6-ebda0cfe7474
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-d444266d-b8c0-40dc-8fb6-ebda0cfe7474-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: sonarr-config-lan
  resources:
    requests:
      storage: 5Gi
