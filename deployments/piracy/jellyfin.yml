apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin-deployment # <--- change this
  namespace: piracy
  labels:
    app: jellyfin # <--- change this to match label on the pod
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin # <--- change this to match label on the pod
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      initContainers:
        - name: iscsi-fsck
          image: alpine:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              MOUNTPOINT="/config"
              echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."

              # Try to write a test file to detect read-only state
              if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                rm -f "${MOUNTPOINT}/.rw-test"
                echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                exit 0
              fi

              echo "[iscsi-fsck] Filesystem is READ-ONLY."
              echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
              if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                rm -f "${MOUNTPOINT}/.rw-test"
                echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                exit 0
              fi
              echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
              echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
              echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
              exit 1
          volumeMounts:
            - name: config
              mountPath: /config
            - name: host-proc-mounts
              mountPath: /host-proc-mounts
      containers:
        - name: jellyfin
          image: lscr.io/linuxserver/jellyfin:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: JELLYFIN_PublishedServerUrl
              value: 80.241.214.254 # The IP number for your jellyfin server (see service config)
            - name: PGID
              value: "950"
            - name: PUID
              value: "950"
            - name: TZ
              value: Europe/Madrid
          ports:
            - containerPort: 8096
              protocol: TCP
            - containerPort: 8920
              protocol: TCP
            - containerPort: 1900
              protocol: UDP
            - containerPort: 7359
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: media
              mountPath: /media
            - name: dev-dri
              mountPath: /dev/dri
            - name: dev-dma-heap
              mountPath: /dev/dma_heap
            - name: dev-mali0
              mountPath: /dev/mali0
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: data
          nfs:
            server: 192.168.0.29
            path: /mnt/RAID/Public
        - name: media
          nfs:
            server: 192.168.0.29
            path: /mnt/RAID/docker/media
        - name: dev-dri
          hostPath:
            path: /dev/dri
        - name: dev-dma-heap
          hostPath:
            path: /dev/dma_heap
        - name: dev-mali0
          hostPath:
            path: /dev/mali0
        - name: host-proc-mounts
          hostPath:
            path: /proc/1/mounts
      nodeSelector:
        kubernetes.io/hostname: orange-pi5
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin-http
  namespace: piracy
spec:
  type: LoadBalancer
  ports:
    - name: jellyfin-http
      protocol: TCP
      port: 8096
      targetPort: 8096
    - name: jellyfin-2
      protocol: TCP
      port: 8920
      targetPort: 8920
    - name: jellyfin-3
      protocol: UDP
      port: 1900
      targetPort: 1900
    - name: jellyfin-4
      protocol: UDP
      port: 7359
      targetPort: 7359
  selector:
    app: jellyfin
---
apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: jellyfin-http
      protocol: TCP
      port: 8096
      targetPort: 8096
    - name: jellyfin-2
      protocol: TCP
      port: 8920
      targetPort: 8920
    - name: jellyfin-3
      protocol: UDP
      port: 1900
      targetPort: 1900
    - name: jellyfin-4
      protocol: UDP
      port: 7359
      targetPort: 7359
  selector:
    app: jellyfin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: jellyfin.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: jellyfin
                port:
                  number: 8096
  tls:
    - secretName: jellyfin.${BASE_DOMAIN}
      hosts:
        - jellyfin.${BASE_DOMAIN}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 10Gi