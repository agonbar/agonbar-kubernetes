apiVersion: apps/v1
kind: Deployment
metadata:
    name: slskd-deployment
    namespace: piracy
    labels:
        app: slskd
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: slskd
    template:
        metadata:
            labels:
                app: slskd
        spec:
            securityContext:
                runAsUser: 950
                runAsGroup: 950
                fsGroup: 950
            dnsPolicy: "None"
            dnsConfig:
                nameservers:
                    - 1.1.1.1
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                      runAsUser: 0
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/app"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: app
                        mountPath: /app
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: slskd
                  image: slskd/slskd:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: SLSKD_REMOTE_CONFIGURATION
                        value: 'true'
                      - name: SLSKD_WEB_IP_ADDRESS
                        value: '0.0.0.0'
                      - name: SLSKD_SHARED_DIR
                        value: /music
                      - name: SLSKD_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: username
                      - name: SLSKD_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: password
                      - name: SLSKD_JWT_KEY
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: jwt-key
                      - name: SLSKD_SLSK_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: slsk-username
                      - name: SLSKD_SLSK_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: slsk-password
                      - name: SLSKD_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: api-key
                  ports:
                      - containerPort: 5030
                        protocol: TCP
                        name: web
                      - containerPort: 5031
                        protocol: TCP
                        name: web-https
                      - containerPort: 50300
                        protocol: TCP
                        name: soulseek
                  volumeMounts:
                      - name: app
                        mountPath: /app
                      - name: incomplete
                        mountPath: /app/incomplete
                      - name: downloads
                        mountPath: /app/downloads
                      - name: music
                        mountPath: /music
                        readOnly: true
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 5030
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 5030
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 1Gi
                          cpu: 1000m
            volumes:
                - name: app
                  persistentVolumeClaim:
                      claimName: slskd-config
                - name: incomplete
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents/slskd-incomplete
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents/slskd
                - name: music
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media/music
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
              kubernetes.io/hostname: orange-pi5
---
apiVersion: v1
kind: Service
metadata:
  name: slskd
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 5030
      targetPort: 5030
    - name: soulseek
      protocol: TCP
      port: 50300
      targetPort: 50300
  selector:
    app: slskd
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskd-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: slskd.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: slskd
                port:
                  number: 5030
  tls:
    - secretName: slskd.${BASE_DOMAIN}
      hosts:
        - slskd.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: slskd-config-lan
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: slskd-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-54e1fdf2-5b8e-4ce8-a37d-98506e183b4c
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-54e1fdf2-5b8e-4ce8-a37d-98506e183b4c-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: slskd-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: slskd-config-lan
  resources:
    requests:
      storage: 10Gi
