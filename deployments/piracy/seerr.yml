apiVersion: apps/v1
kind: Deployment
metadata:
    name: seerr-deployment
    namespace: piracy
    labels:
        app: seerr
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: seerr
    template:
        metadata:
            labels:
                app: seerr
        spec:
            initContainers:
                - name: fix-permissions
                  image: busybox:latest
                  command: ["sh", "-c", "chown -R 1000:1000 /app/config"]
                  volumeMounts:
                      - name: config
                        mountPath: /app/config
            containers:
                - name: seerr
                  image: ghcr.io/seerr-team/seerr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: LOG_LEVEL
                        value: debug
                      - name: TZ
                        value: Europe/Madrid
                      - name: PORT
                        value: "5055"
                  ports:
                      - containerPort: 5055
                        protocol: TCP
                  volumeMounts:
                      - name: config
                        mountPath: /app/config
                  livenessProbe:
                      httpGet:
                          path: /api/v1/status
                          port: 5055
                      initialDelaySeconds: 20
                      periodSeconds: 15
                      timeoutSeconds: 3
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 1Gi
                          cpu: 500m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: seerr-config
            nodeSelector:
                svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
    name: seerr
    namespace: piracy
spec:
    type: ClusterIP
    ports:
        - name: web
          protocol: TCP
          port: 5055
          targetPort: 5055
    selector:
        app: seerr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: seerr-https
    namespace: piracy
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
    ingressClassName: traefik
    rules:
        - host: seerr.${BASE_DOMAIN}
          http:
              paths:
                  - pathType: Prefix
                    path: /
                    backend:
                        service:
                            name: seerr
                            port:
                                number: 5055
    tls:
        - secretName: seerr.${BASE_DOMAIN}
          hosts:
              - seerr.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: seerr-config-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: seerr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-d4bba15c-8249-4349-b71d-48c8298f8e52
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-d4bba15c-8249-4349-b71d-48c8298f8e52-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: seerr-config-lan
  resources:
    requests:
      storage: 5Gi
