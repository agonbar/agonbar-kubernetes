apiVersion: apps/v1
kind: Deployment
metadata:
    name: soularr-deployment
    namespace: piracy
    labels:
        app: soularr
spec:
    replicas: 1
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: soularr
    template:
        metadata:
            labels:
                app: soularr
        spec:
            securityContext:
                runAsUser: 950
                runAsGroup: 950
                fsGroup: 950
            containers:
                - name: soularr
                  image: mrusse08/soularr:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: TZ
                        value: Europe/Madrid
                      - name: SCRIPT_INTERVAL
                        value: '300'
                      - name: SLSKD_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: slskd
                            key: api-key
                  volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: downloads
                        mountPath: /downloads
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 512Mi
                          cpu: 200m
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: soularr-config
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: soularr-config-lan
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: soularr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-23225800-e014-47c8-b532-ef097036645c
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-23225800-e014-47c8-b532-ef097036645c-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soularr-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: soularr-config-lan
  resources:
    requests:
      storage: 1Gi
