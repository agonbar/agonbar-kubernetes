apiVersion: apps/v1
kind: Deployment
metadata:
    name: qbittorrent-deployment
    namespace: piracy
    labels:
        app: qbittorrent
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: qbittorrent
    template:
        metadata:
            labels:
                app: qbittorrent
        spec:
            dnsPolicy: "None"
            dnsConfig:
                nameservers:
                    - 1.1.1.1
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/config"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: qbittorrent
                  image: linuxserver/qbittorrent:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: PGID
                        value: '950'
                      - name: PUID
                        value: '950'
                      - name: TZ
                        value: Europe/Madrid
                      - name: WEBUI_PORT
                        value: '8080'
                  ports:
                      - containerPort: 8080
                        protocol: TCP
                        name: web
                      - containerPort: 6881
                        protocol: TCP
                        name: torrent-tcp
                      - containerPort: 6881
                        protocol: UDP
                        name: torrent-udp
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: downloads
                        mountPath: /downloads
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 8080
                      initialDelaySeconds: 30
                      periodSeconds: 15
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 8080
                      initialDelaySeconds: 15
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 200m
                      limits:
                          memory: 2Gi
                          cpu: 1000m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: qbittorrent-config
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 8080
      targetPort: 8080
  selector:
    app: qbittorrent
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: qbittorrent.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: qbittorrent
                port:
                  number: 8080
  tls:
    - secretName: qbittorrent.${BASE_DOMAIN}
      hosts:
        - qbittorrent.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-config-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: qbittorrent-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-e2bb1812-4868-4691-b2dc-73426b1d5f0a
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-e2bb1812-4868-4691-b2dc-73426b1d5f0a-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: qbittorrent-config-lan
  resources:
    requests:
      storage: 5Gi
