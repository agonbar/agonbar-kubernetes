apiVersion: apps/v1
kind: Deployment
metadata:
    name: qui-deployment
    namespace: piracy
    labels:
        app: qui
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: qui
    template:
        metadata:
            labels:
                app: qui
        spec:
            containers:
                - name: qui
                  image: ghcr.io/autobrr/qui:latest
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: PGID
                        value: '1000'
                      - name: PUID
                        value: '1000'
                      - name: TZ
                        value: Europe/Madrid
                  ports:
                      - containerPort: 7476
                        protocol: TCP
                  volumeMounts:
                      - name: config
                        mountPath: /config
                      - name: downloads
                        mountPath: /downloads
                  resources:
                      requests:
                          memory: 128Mi
                          cpu: 100m
                      limits:
                          memory: 512Mi
                          cpu: 200m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: qui-config
                - name: downloads
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/SSD/torrents
            nodeSelector:
              svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
  name: qui
  namespace: piracy
spec:
  type: ClusterIP
  ports:
    - name: web
      protocol: TCP
      port: 7476
      targetPort: 7476
  selector:
    app: qui
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qui-https
  namespace: piracy
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: qui.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: qui
                port:
                  number: 7476
  tls:
    - secretName: qui.${BASE_DOMAIN}
      hosts:
        - qui.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qui-config-lan
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: qui-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-183225f5-bb65-41e1-ad26-a9772717c2de
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-183225f5-bb65-41e1-ad26-a9772717c2de-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qui-config
  namespace: piracy
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd-lan
  volumeName: qui-config-lan
  resources:
    requests:
      storage: 2Gi
