apiVersion: apps/v1
kind: Deployment
metadata:
    name: tdarr-deployment
    namespace: piracy
    labels:
        app: tdarr
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: tdarr
    template:
        metadata:
            labels:
                app: tdarr
        spec:
            enableServiceLinks: false
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/app/configs"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: config
                        mountPath: /app/configs
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: tdarr
                  image: ghcr.io/haveagitgat/tdarr:2.70.01
                  imagePullPolicy: IfNotPresent
                  env:
                      - name: TZ
                        value: Europe/Madrid
                      - name: PUID
                        value: '950'
                      - name: PGID
                        value: '950'
                      - name: UMASK_SET
                        value: '002'
                      - name: serverIP
                        value: 0.0.0.0
                      - name: serverPort
                        value: '8266'
                      - name: webUIPort
                        value: '8265'
                      - name: internalNode
                        value: 'false'
                      - name: inContainer
                        value: 'true'
                      - name: auth
                        value: 'true'
                      - name: authSecretKey
                        valueFrom:
                            secretKeyRef:
                                name: tdarr
                                key: auth-secret-key
                      - name: seededApiKey
                        valueFrom:
                            secretKeyRef:
                                name: tdarr
                                key: seeded-api-key
                      - name: apiKey
                        valueFrom:
                            secretKeyRef:
                                name: tdarr
                                key: seeded-api-key
                  ports:
                      - containerPort: 8265
                        protocol: TCP
                      - containerPort: 8266
                        hostPort: 8266
                        protocol: TCP
                  volumeMounts:
                      - name: config
                        mountPath: /app/configs
                      - name: server
                        mountPath: /app/server
                      - name: media
                        mountPath: /media
                  # Liveness probe relaxed (was 5s/15s/3): the server's
                  # /Node event loop blocks on heavy SQLite writes (queue
                  # builder over a 6500-file library) and on synchronous
                  # ffmpeg post-processing plugins. The previous defaults
                  # killed the pod mid-job. With the long timeout the pod
                  # only restarts on a true wedge.
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 8265
                      initialDelaySeconds: 60
                      periodSeconds: 60
                      timeoutSeconds: 30
                      failureThreshold: 5
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 8265
                      initialDelaySeconds: 30
                      periodSeconds: 30
                      timeoutSeconds: 15
                      failureThreshold: 5
                  resources:
                      requests:
                          memory: 256Mi
                          cpu: 200m
                      limits:
                          memory: 4Gi
                          cpu: 4000m
            volumes:
                - name: config
                  persistentVolumeClaim:
                      claimName: tdarr-config
                - name: server
                  persistentVolumeClaim:
                      claimName: tdarr-server
                - name: media
                  nfs:
                      server: 192.168.0.29
                      path: /mnt/RAID/docker/media
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
                kubernetes.io/hostname: orange-pi5
---
apiVersion: v1
kind: Service
metadata:
    name: tdarr
    namespace: piracy
spec:
    type: ClusterIP
    ports:
        - name: web
          protocol: TCP
          port: 8265
          targetPort: 8265
        - name: server
          protocol: TCP
          port: 8266
          targetPort: 8266
    selector:
        app: tdarr
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: tdarr-https
    namespace: piracy
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
    ingressClassName: traefik
    rules:
        - host: tdarr.${BASE_DOMAIN}
          http:
              paths:
                  - pathType: Prefix
                    path: /
                    backend:
                        service:
                            name: tdarr
                            port:
                                number: 8265
    tls:
        - secretName: tdarr.${BASE_DOMAIN}
          hosts:
              - tdarr.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-config-lan
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: tdarr-config
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-3713c714-4ec1-4954-a15e-78aaada850eb
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-3713c714-4ec1-4954-a15e-78aaada850eb-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: tdarr-config
    namespace: piracy
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: truenas-iscsi-ssd-lan
    volumeName: tdarr-config-lan
    resources:
        requests:
            storage: 2Gi
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tdarr-server-lan
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: tdarr-server
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-572e2195-5b02-4cea-81df-642b53feae81
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-572e2195-5b02-4cea-81df-642b53feae81-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: tdarr-server
    namespace: piracy
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: truenas-iscsi-ssd-lan
    volumeName: tdarr-server-lan
    resources:
        requests:
            storage: 5Gi
