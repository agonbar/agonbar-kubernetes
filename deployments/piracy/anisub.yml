apiVersion: apps/v1
kind: Deployment
metadata:
    name: anisub-deployment
    namespace: piracy
    labels:
        app: anisub
spec:
    strategy:
        type: Recreate
    replicas: 1
    selector:
        matchLabels:
            app: anisub
    template:
        metadata:
            labels:
                app: anisub
        spec:
            enableServiceLinks: false
            initContainers:
                - name: iscsi-fsck
                  image: alpine:latest
                  imagePullPolicy: IfNotPresent
                  securityContext:
                      privileged: true
                  command:
                      - /bin/sh
                      - -c
                      - |
                        set -e
                        MOUNTPOINT="/data"
                        echo "[iscsi-fsck] Checking filesystem at ${MOUNTPOINT}..."
                        if touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] Filesystem is writable. Nothing to do."
                          exit 0
                        fi
                        echo "[iscsi-fsck] Filesystem is READ-ONLY."
                        echo "[iscsi-fsck] Attempting a single safe remount,rw (no fsck)..."
                        if mount -o remount,rw "${MOUNTPOINT}" 2>/dev/null && touch "${MOUNTPOINT}/.rw-test" 2>/dev/null; then
                          rm -f "${MOUNTPOINT}/.rw-test"
                          echo "[iscsi-fsck] remount,rw succeeded — filesystem writable. Done."
                          exit 0
                        fi
                        echo "[iscsi-fsck] STILL READ-ONLY. The RO state lives in the node-level CSI globalmount and cannot be repaired from inside the pod."
                        echo "[iscsi-fsck] DO NOT run e2fsck on the mounted device — it corrupts the filesystem."
                        echo "[iscsi-fsck] Recovery: scale this Deployment to 0, wait for the VolumeAttachment to detach, then scale back to 1 (forces a clean iSCSI re-attach that clears RO)."
                        exit 1
                  volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: host-proc-mounts
                        mountPath: /host-proc-mounts
            containers:
                - name: anisub
                  image: ghcr.io/agonbar/anisub:latest
                  imagePullPolicy: Always
                  env:
                      - name: BAZARR_URL
                        value: "http://bazarr:6767"
                      - name: SONARR_URL
                        value: "http://sonarr:8989"
                      - name: CRUNCHARR_URL
                        value: "http://cruncharr:3000"
                      - name: BAZARR_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: anisub-secrets
                                key: BAZARR_API_KEY
                      - name: SONARR_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: anisub-secrets
                                key: SONARR_API_KEY
                      - name: CRUNCHARR_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: anisub-secrets
                                key: CRUNCHARR_API_KEY
                      - name: DATA_DIR
                        value: "/data"
                      - name: WEB_PORT
                        value: "8080"
                      - name: POLL_INTERVAL
                        value: "30m"
                      - name: HTTP_TIMEOUT
                        value: "180s"
                      - name: CHECK_CONCURRENCY
                        value: "3"
                      - name: TRIGGER_BATCH_SIZE
                        value: "5"
                      - name: TRIGGER_BATCH_DELAY
                        value: "30s"
                      - name: DRY_RUN
                        value: "false"
                      - name: LOG_LEVEL
                        value: "info"
                      - name: DISCOVERY_ENABLED
                        value: "true"
                      - name: SONARR_PUBLIC_URL
                        value: "https://sonarr.${BASE_DOMAIN}"
                      - name: UPGRADE_NON_CRUNCHYROLL
                        value: "true"
                      - name: UPGRADE_DRY_RUN
                        value: "false"
                      - name: FORCE_GRAB_ENABLED
                        value: "true"
                      - name: FORCE_GRAB_DRY_RUN
                        value: "false"
                      - name: FORCE_GRAB_INDEXER_NAME
                        value: "Cruncharr"
                      - name: FORCE_GRAB_MAX_CRUNCHARR_QUEUE
                        value: "20"
                      - name: CRUNCHARR_QBIT_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: cruncharr
                                key: gui-password
                      - name: FORCEGRAB_RESCAN_DELAYS
                        value: "10m,8h,24h,72h,168h"
                  ports:
                      - containerPort: 8080
                        protocol: TCP
                  volumeMounts:
                      - name: data
                        mountPath: /data
                  resources:
                      requests:
                          memory: 64Mi
                          cpu: 50m
                      limits:
                          memory: 256Mi
                          cpu: 250m
                  livenessProbe:
                      httpGet:
                          path: /api/status
                          port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /api/status
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
            volumes:
                - name: data
                  persistentVolumeClaim:
                      claimName: anisub-data
                - name: host-proc-mounts
                  hostPath:
                      path: /proc/1/mounts
            nodeSelector:
                svccontroller.k3s.cattle.io/lbpool: lamg
---
apiVersion: v1
kind: Service
metadata:
    name: anisub
    namespace: piracy
spec:
    type: ClusterIP
    ports:
        - name: web
          protocol: TCP
          port: 8080
          targetPort: 8080
    selector:
        app: anisub
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: anisub-https
    namespace: piracy
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
    ingressClassName: traefik
    rules:
        - host: anisub.${BASE_DOMAIN}
          http:
              paths:
                  - pathType: Prefix
                    path: /
                    backend:
                        service:
                            name: anisub
                            port:
                                number: 8080
    tls:
        - secretName: anisub.${BASE_DOMAIN}
          hosts:
              - anisub.${BASE_DOMAIN}
---
# Migrated off the Tailscale iSCSI portal (100.72.0.41) onto the wired-LAN driver
# (truenas-iscsi-ssd-lan -> 192.168.0.29). Statically bound to the retained zvol.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: anisub-data-lan
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: truenas-iscsi-ssd-lan
  claimRef:
    namespace: piracy
    name: anisub-data
  csi:
    driver: org.democratic-csi.truenas-iscsi-ssd-lan
    fsType: ext4
    volumeHandle: pvc-0f59dafc-214f-49e7-93e4-bf22f56190ec
    volumeAttributes:
      node_attach_driver: iscsi
      portal: "192.168.0.29:3260"
      portals: ""
      interface: ""
      iqn: "iqn.2005-10.org.freenas.ctl:csi-pvc-0f59dafc-214f-49e7-93e4-bf22f56190ec-k8s"
      lun: "0"
      provisioner_driver: freenas-api-iscsi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
    name: anisub-data
    namespace: piracy
spec:
    accessModes:
        - ReadWriteOnce
    storageClassName: truenas-iscsi-ssd-lan
    volumeName: anisub-data-lan
    resources:
        requests:
            storage: 1Gi
