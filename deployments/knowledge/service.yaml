# Optional ClusterIP — tailnet access is via the sidecar (vault-mcp.senseizero.lan),
# this is only for in-cluster reach / `kubectl port-forward` debugging.
apiVersion: v1
kind: Service
metadata:
  name: vault-mcp
  namespace: knowledge
  labels:
    app: vault-mcp
spec:
  type: ClusterIP
  selector:
    app: vault-mcp
  ports:
    - name: mcp
      port: 8000
      targetPort: mcp
      protocol: TCP
