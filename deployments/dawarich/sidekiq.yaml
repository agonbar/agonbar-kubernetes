apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: dawarich-sidekiq
  namespace: dawarich
  labels:
    app: dawarich-sidekiq
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dawarich-sidekiq
  template:
    metadata:
      labels:
        app: dawarich-sidekiq
    spec:
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
      containers:
      - name: dawarich-sidekiq
        image: freikin/dawarich:latest
        command: ["bundle", "exec", "sidekiq"]
        env:
        - name: RAILS_ENV
          value: "development"
        - name: REDIS_URL
          value: "redis://dawarich-redis:6379/0"
        - name: DATABASE_HOST
          value: "dawarich-db"
        - name: DATABASE_USERNAME
          value: "dawarich"
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dawarich
              key: databasePassword
        - name: DATABASE_NAME
          value: "dawarich_development"
        - name: APPLICATION_HOSTS
          value: "dawarich.${BASE_DOMAIN}"
        - name: BACKGROUND_PROCESSING_CONCURRENCY
          value: "10"
        - name: APPLICATION_PROTOCOL
          value: "http"
        - name: DISTANCE_UNIT
          value: "km"
        - name: PROMETHEUS_EXPORTER_ENABLED
          value: "false"
        - name: PROMETHEUS_EXPORTER_HOST
          value: "dawarich-app"
        - name: PROMETHEUS_EXPORTER_PORT
          value: "9394"
        - name: SELF_HOSTED
          value: "true"
        volumeMounts:
        - name: dawarich-public
          mountPath: /var/app/public
        - name: dawarich-watched
          mountPath: /var/app/tmp/imports/watched
        - name: dawarich-storage
          mountPath: /var/app/storage
        - name: dawarich-tmp
          mountPath: /var/app/tmp
        livenessProbe:
          exec:
            command:
            - bundle
            - exec
            - sidekiqmon
            - processes
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 30
      securityContext:
        fsGroup: 1000
      volumes:
      - name: dawarich-public
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/dawarich/public
      - name: dawarich-watched
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/dawarich/watched
      - name: dawarich-storage
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/dawarich/storage
      - name: dawarich-tmp
        nfs:
          server: 192.168.0.29
          path: /mnt/RAID/docker/dawarich/tmp