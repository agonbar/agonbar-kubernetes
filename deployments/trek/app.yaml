apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    keel.sh/pollSchedule: "@every 72h"
  name: trek
  namespace: trek
  labels:
    app: trek
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
spec:
  # SQLite on an iSCSI RWO PVC — single writer only, never two pods at once.
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: trek
  template:
    metadata:
      labels:
        app: trek
    spec:
      # Pin to the lamg house for TrueNAS/iSCSI storage locality.
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
      securityContext:
        fsGroup: 1000
      containers:
      - name: trek
        image: mauriceboe/trek:latest
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: TZ
          value: "Europe/Madrid"
        - name: APP_URL
          value: "https://trek.${BASE_DOMAIN}"
        - name: FORCE_HTTPS
          value: "true"
        - name: TRUST_PROXY
          value: "true"
        - name: COOKIE_SECURE
          value: "true"
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: trek
              key: encryptionKey
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: data
          mountPath: /app/data
        - name: uploads
          mountPath: /app/uploads
        livenessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        readinessProbe:
          tcpSocket:
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: trek-data
      - name: uploads
        persistentVolumeClaim:
          claimName: trek-uploads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trek-data
  namespace: trek
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trek-uploads
  namespace: trek
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: truenas-iscsi-ssd
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: trek
  namespace: trek
spec:
  selector:
    app: trek
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trek-https
  namespace: trek
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: trek.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: trek
                port:
                  number: 3000
  tls:
    - secretName: trek.${BASE_DOMAIN}
      hosts:
        - trek.${BASE_DOMAIN}
