apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: synapse
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
      keel.sh/pollSchedule: "@every 72h"
  name: synapse
  namespace: matrix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapse
  template:
    metadata:
      labels:
        app: synapse
    spec:
      containers:
        - image: matrixdotorg/synapse:latest
          name: synapse
          ports:
            - containerPort: 8008
              name: synapse
              protocol: TCP
            - containerPort: 8448
              name: synapse-tls
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: secret-volume
              readOnly: true
              mountPath: "/etc/secret-volume"
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
      volumes:
      - name: data
        hostPath:
          path: /docker/matrix/synapse
          type: Directory
      - name: secret-volume
        secret:
          secretName: ${BASE_DOMAIN}
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: synapse
  namespace: matrix
spec:
  type: NodePort

  selector:
    app: synapse

  ports:
    - protocol: TCP
      port: 8008
      targetPort: 8008
      name: synapse

---
kind: Service
apiVersion: v1
metadata:
  name: synapse-lb
  namespace: matrix
spec:
  type: LoadBalancer

  selector:
    app: synapse

  ports:
    - protocol: TCP
      port: 8448
      targetPort: 8448
      name: synapse

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse-https
  namespace: matrix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: matrix.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: synapse
                port:
                  number: 8008
  tls:
    - secretName: matrix.${BASE_DOMAIN}
      hosts:
        - matrix.${BASE_DOMAIN}
