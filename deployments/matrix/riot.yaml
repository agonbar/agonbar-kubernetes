apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: riot
    keel.sh/policy: force
    keel.sh/match-tag: "true"
    keel.sh/trigger: poll
  annotations:
      keel.sh/pollSchedule: "@every 72h"
  name: riot
  namespace: matrix
spec:
  replicas: 0
  selector:
    matchLabels:
      app: riot
  template:
    metadata:
      labels:
        app: riot
    spec:
      containers:
        - image: vectorim/element-web:latest
          name: riot
          ports:
            - containerPort: 80
              name: riot
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 5m
              memory: 30Mi
      volumes:
      - name: data
        hostPath:
          path: /docker/matrix/riot
          type: Directory
      nodeSelector:
        kubernetes.io/hostname: "ovh02"
      imagePullSecrets:
        - name: dockerhub-secret

---
kind: Service
apiVersion: v1
metadata:
  name: riot
  namespace: matrix
spec:
  type: NodePort

  selector:
    app: riot

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      name: riot


---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: riot-https
  namespace: matrix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  rules:
    - host: riot.${BASE_DOMAIN}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: riot
                port:
                  number: 80
  tls:
    - secretName: riot.${BASE_DOMAIN}
      hosts:
        - riot.${BASE_DOMAIN}