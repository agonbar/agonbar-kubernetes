---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-vip
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "list"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-vip
subjects:
  - kind: ServiceAccount
    name: kube-vip
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: kube-vip
  apiGroup: rbac.authorization.k8s.io

---
# kube-vip DaemonSet for lamg LAN virtual IP
#
# Provides a floating VIP (192.168.0.26) across the lamg worker nodes
# (nas00, nas01, orange-pi5) on their physical LAN interfaces.
#
# How it works:
# - Leader election via Kubernetes Lease — one node holds the VIP at a time
# - ARP mode — the leader responds to ARP requests for the VIP
# - Auto-detect interface — finds the LAN interface by matching the VIP
#   subnet (192.168.0.0/24) against each node's interfaces
# - K3s ServiceLB svclb pods already bind to 0.0.0.0:port (hostPort),
#   so all lamg services are automatically accessible through the VIP
# - Failover in ~5 seconds if the leader node goes down
#
# No changes to existing services are required.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip-lamg
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip
    app.kubernetes.io/component: lamg-vip
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip-lamg
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip-lamg
    spec:
      serviceAccountName: kube-vip
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
      hostNetwork: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v0.8.9
          args: ["manager"]
          env:
            # ARP mode — announce VIP via gratuitous ARP on the LAN
            - name: vip_arp
              value: "true"
            # The floating virtual IP on the lamg LAN
            - name: address
              value: "192.168.0.26"
            - name: vip_cidr
              value: "32"
            # Enable control-plane VIP mode (used here as a generic static VIP)
            # This does NOT interfere with the actual control plane on ovh02
            - name: cp_enable
              value: "true"
            - name: cp_namespace
              value: "kube-system"
            # Do NOT manage LoadBalancer services — K3s ServiceLB handles that
            - name: svc_enable
              value: "false"
            # Leader election for HA failover.
            # Timings deliberately RELAXED (was 5/3/1) — the aggressive 1s renew
            # made kube-vip rewrite its Lease ~1×/sec AND fatal+restart the instant
            # the (kine/SQLite) control plane was >3s slow, producing a crashloop
            # storm that hammered the datastore. 30/20/5 cuts lease-write traffic
            # ~5× and tolerates ~20s of API latency before failing over (~30s
            # failover, fine for a LAN VIP). See runbooks/ovh02-cryptojacking-incident.md.
            - name: vip_leaderelection
              value: "true"
            - name: vip_leasename
              value: "kube-vip-lamg"
            - name: vip_leaseduration
              value: "30"
            - name: vip_renewdeadline
              value: "20"
            - name: vip_retryperiod
              value: "5"
            # Prometheus metrics endpoint
            - name: prometheus_server
              value: ":2112"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
