apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ovh-system-upgrade-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rancher/system-upgrade-controller
    path: .
    targetRevision: HEAD
  destination:
    namespace: system-upgrade
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true