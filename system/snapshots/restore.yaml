apiVersion: batch/v1
kind: Job
metadata:
  name: restore-qui-config
  namespace: piracy
  labels:
    app: pvc-restore
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: rsync
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              rsync -av /backup/piracy/qui-config/ /data/
              echo "Restore complete: qui-config"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: backup
              mountPath: /backup
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qui-config
        - name: backup
          nfs:
            server: 192.168.0.29
            path: /mnt/RAID/docker/backups-iscsi
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
