# Restore jobs: rsync data from NFS/RAID backup into iSCSI PVCs
# Usage: kubectl --context lamg apply -f system/snapshots/restore.yaml
# Prerequisites: all target PVCs must exist and be Bound, all deployments scaled to 0
# Cleanup: kubectl --context lamg delete -f system/snapshots/restore.yaml
# See RESTORE.md for full procedure
# ============================================================
# agonbar namespace (3 PVCs)
# ============================================================
---
apiVersion: batch/v1
kind: Job
metadata:
  name: restore-homarr-appdata
  namespace: agonbar
  labels:
    app: pvc-restore
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: rsync
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              apk add --no-cache rsync
              rsync -av /backup/agonbar/homarr-appdata/ /data/
              echo "Restore complete: homarr-appdata"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: backup
              mountPath: /backup
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homarr-appdata
        - name: backup
          nfs:
            server: 192.168.0.29
            path: /mnt/RAID/docker/backups-iscsi
      nodeSelector:
        svccontroller.k3s.cattle.io/lbpool: lamg
