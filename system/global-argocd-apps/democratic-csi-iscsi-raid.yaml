apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-iscsi-raid
  namespace: argocd
spec:
  project: default
  source:
    chart: democratic-csi
    repoURL: https://democratic-csi.github.io/charts/
    targetRevision: 0.14.7
    helm:
      releaseName: democratic-csi-iscsi-raid
      valuesObject:
        csiDriver:
          name: "org.democratic-csi.truenas-iscsi-raid"

        storageClasses:
          - name: truenas-iscsi-raid
            defaultClass: false
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
            parameters:
              fsType: ext4
            mountOptions: []
            secrets:
              provisioner-secret:
              controller-publish-secret:
              node-stage-secret:
              node-publish-secret:
              controller-expand-secret:

        volumeSnapshotClasses:
          - name: truenas-iscsi-raid
            deletionPolicy: Delete
            parameters: {}

        driver:
          existingConfigSecret: democratic-csi-iscsi-raid-driver-config
          config:
            driver: freenas-api-iscsi
  destination:
    name: in-cluster
    namespace: democratic-csi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - Validate=false
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m0s
