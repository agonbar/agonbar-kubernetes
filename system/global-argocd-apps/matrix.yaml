apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: matrix
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/agonbar/agonbar-kubernetes.git'
    path: deployments/matrix
    targetRevision: HEAD
    plugin:
      name: envsubst-plugin-v1
  destination:
    namespace: matrix
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - Validate=false
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m0s