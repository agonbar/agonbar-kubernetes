apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keel
  namespace: argocd
spec:
  project: default
  source:
    chart: keel
    repoURL: https://charts.keel.sh
    targetRevision: 1.2.0
    helm:
      releaseName: keel
      valuesObject:
        helmProvider:
          enabled: false
        basicauth:
          enabled: false
        service:
          enabled: false
          type: ClusterIP
        ingress:
          enabled: false
        nodeSelector:
          kubernetes.io/arch: amd64
  destination:
    name: in-cluster
    namespace: keel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true
      - Validate=false
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 20s
        factor: 2
        maxDuration: 3m0s
